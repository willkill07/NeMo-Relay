sonar.projectKey=GPUSW_SW_SW_NeMo-Flow
sonar.nodejs.version=24
sonar.python.version=3.11, 3.12, 3.13
sonar.rust.version=1.93.0
sonar.sources=.github,crates,go,python,scripts
sonar.issue.ignore.block=manual-suppress
sonar.issue.ignore.block.manual-suppress.beginBlockRegexp=SONAR_IGNORE_START
sonar.issue.ignore.block.manual-suppress.endBlockRegexp=SONAR_IGNORE_END
sonar.cpd.exclusions=**/tests/**,**/tests-js/**,**/*test*
# crates/wasm/src/** is excluded because cargo-llvm-cov does not support the
# wasm32-unknown-unknown target; WebAssembly coverage is measured on the JavaScript
# side with c8 against the compiled output in pkg/.
sonar.coverage.exclusions=**/tests/**,**/tests-js/**,**/*test*,scripts/**
