name: Label pull request

on:
  pull_request_target:
    types:
      - edited
      - opened
      - ready_for_review
      - reopened
      - synchronize

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  label:
    name: Apply PR labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Apply size, breaking, type, and language labels
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          size_labels=("size:XS" "size:S" "size:M" "size:L" "size:XL" "size:XXL")
          classifier_labels=("build" "chore" "ci" "doc" "feat" "fix" "perf" "refactor" "revert" "style" "test")
          lang_labels=("lang:go" "lang:js" "lang:python" "lang:rust")
          controlled_labels=("${size_labels[@]}" "${classifier_labels[@]}" "${lang_labels[@]}")

          contains_label() {
            local needle="$1"
            shift
            local label
            for label in "$@"; do
              if [[ "$label" == "$needle" ]]; then
                return 0
              fi
            done
            return 1
          }

          mapfile -t file_rows < <(
            gh api --paginate "repos/${REPO}/pulls/${PR_NUMBER}/files" \
              --jq '.[] | [.filename, .additions, .deletions] | @tsv'
          )

          changed_lines=0
          has_go=false
          has_js=false
          has_python=false
          has_rust=false

          for row in "${file_rows[@]}"; do
            IFS=$'\t' read -r path additions deletions <<< "$row"
            changed_lines=$((changed_lines + additions + deletions))

            case "$path" in
              *.go|go/*|*/go.mod|*/go.sum|go.mod|go.sum)
                has_go=true
                ;;
            esac

            case "$path" in
              *.cjs|*.cts|*.js|*.jsx|*.mjs|*.mts|*.ts|*.tsx|crates/node/*|*/package.json|*/package-lock.json|package.json|package-lock.json)
                has_js=true
                ;;
            esac

            case "$path" in
              *.py|*.pyi|python/*|crates/python/*|pyproject.toml|uv.lock)
                has_python=true
                ;;
            esac

            case "$path" in
              *.rs|Cargo.toml|Cargo.lock|crates/*/Cargo.toml)
                has_rust=true
                ;;
            esac
          done

          if (( changed_lines <= 10 )); then
            size_label="size:XS"
          elif (( changed_lines <= 100 )); then
            size_label="size:S"
          elif (( changed_lines <= 500 )); then
            size_label="size:M"
          elif (( changed_lines <= 1000 )); then
            size_label="size:L"
          elif (( changed_lines <= 5000 )); then
            size_label="size:XL"
          else
            size_label="size:XXL"
          fi

          desired_labels=("$size_label")

          title_lower="${PR_TITLE,,}"
          classifier_label=""
          title_pattern='^(build|chore|ci|doc|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?(!)?:'
          breaking_pattern='^(build|chore|ci|doc|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?!:'
          if [[ "$title_lower" =~ $title_pattern ]]; then
            classifier_label="${BASH_REMATCH[1]}"
            if [[ "$classifier_label" == "docs" ]]; then
              classifier_label="doc"
            fi
            desired_labels+=("$classifier_label")
          fi
          if [[ "$PR_TITLE" =~ $breaking_pattern ]]; then
            desired_labels+=("breaking")
          fi

          if [[ "$has_go" == true ]]; then
            desired_labels+=("lang:go")
          fi
          if [[ "$has_js" == true ]]; then
            desired_labels+=("lang:js")
          fi
          if [[ "$has_python" == true ]]; then
            desired_labels+=("lang:python")
          fi
          if [[ "$has_rust" == true ]]; then
            desired_labels+=("lang:rust")
          fi

          mapfile -t current_labels < <(
            gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" --jq '.[].name'
          )

          add_labels=()
          for label in "${desired_labels[@]}"; do
            if ! contains_label "$label" "${current_labels[@]}"; then
              add_labels+=("$label")
            fi
          done

          remove_labels=()
          for label in "${controlled_labels[@]}"; do
            if contains_label "$label" "${current_labels[@]}" && ! contains_label "$label" "${desired_labels[@]}"; then
              remove_labels+=("$label")
            fi
          done

          for label in "${remove_labels[@]}"; do
            gh issue edit "$PR_NUMBER" --repo "$REPO" --remove-label "$label"
          done

          for label in "${add_labels[@]}"; do
            gh issue edit "$PR_NUMBER" --repo "$REPO" --add-label "$label"
          done

          printf 'Changed lines: %s\n' "$changed_lines"
          printf 'Desired labels: %s\n' "${desired_labels[*]}"
          printf 'Added labels: %s\n' "${add_labels[*]:-none}"
          printf 'Removed labels: %s\n' "${remove_labels[*]:-none}"
