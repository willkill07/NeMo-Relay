name: CI Pipeline
run-name: CI Pipeline

on:
  workflow_call:
    inputs:
      pr_info:
        description: 'The JSON string containing the PR information'
        required: true
        type: string
      ref_type:
        description: 'The ref type from the triggering workflow'
        required: true
        type: string
      ref_name:
        description: 'The ref name from the triggering workflow'
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      SONAR_TOKEN:
        required: false

defaults:
  run:
    shell: bash

env:
  GH_TOKEN: "${{ github.token }}"
  GIT_COMMIT: "${{ github.sha }}"
  NEMO_FLOW_CI_GO_VERSION: "1.26.1"
  NEMO_FLOW_CI_DEFAULT_PYTHON_VER: "3.11"
  NEMO_FLOW_CI_RUST_VERSION: "1.93.0"
  NEMO_FLOW_CI_NODE_VERSION: "24"
  NEMO_FLOW_CI_UV_VERSION: "0.9.28"
  NEMO_FLOW_CI_JUST_VERSION: "1.47.1"
  NEMO_FLOW_CI_WASM_PACK_VERSION: "0.14.0"
  NEMO_FLOW_CI_CARGO_LLVM_COV_VERSION: "0.8.5"
  NEMO_FLOW_CI_CARGO_NEXTEST_VERSION: "0.9.133"
  NEMO_FLOW_CI_CARGO_DENY_VERSION: "0.19.1"
  NEMO_FLOW_CI_CARGO_ABOUT_VERSION: "0.8.4"
  NEMO_FLOW_CI_SONAR_SCANNER_VERSION: "7.0.2.4839"
  NEMO_FLOW_CI_WORKSPACE: "${{ github.workspace }}/NeMo-Flow"
  NEMO_FLOW_CI_WORKSPACE_TMP: "${{ github.workspace }}/tmp"
  UV_PYTHON_DOWNLOADS: never

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      base: ${{ steps.comparison-base.outputs.base }}
      # Tags and default-branch commits bypass path filtering so packaging always runs.
      run_all: ${{ inputs.ref_type == 'tag' || inputs.ref_name == 'main' || inputs.ref_name == github.event.repository.default_branch || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' }}
      docs: ${{ steps.filter.outputs.docs }}
      go: ${{ steps.filter.outputs.go }}
      node: ${{ steps.filter.outputs.node }}
      python: ${{ steps.filter.outputs.python }}
      rust: ${{ steps.filter.outputs.rust }}
      wasm: ${{ steps.filter.outputs.wasm }}

    steps:
      - name: Checkout
        if: ${{ !(inputs.ref_type == 'tag' || inputs.ref_name == 'main' || inputs.ref_name == github.event.repository.default_branch) }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          path: NeMo-Flow

      - name: Resolve comparison base
        id: comparison-base
        if: ${{ !(inputs.ref_type == 'tag' || inputs.ref_name == 'main' || inputs.ref_name == github.event.repository.default_branch) }}
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          PR_INFO: ${{ inputs.pr_info }}
          REF_NAME: ${{ inputs.ref_name }}
        run: |
          set -euo pipefail
          base=""
          if [[ "$REF_NAME" == pull-request/* ]]; then
            base="$(jq -r '.base.ref // empty' <<< "$PR_INFO")"
            if [[ -z "$base" ]]; then
              echo "Error: failed to resolve PR base branch from pr_info" >&2
              exit 1
            fi
          elif [[ -n "$EVENT_BEFORE" && "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]]; then
            base="$EVENT_BEFORE"
          else
            base="${GITHUB_REF}"
          fi
          printf 'base=%s\n' "$base" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: filter
        if: ${{ !(inputs.ref_type == 'tag' || inputs.ref_name == 'main' || inputs.ref_name == github.event.repository.default_branch) }}
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.01
        with:
          base: ${{ steps.comparison-base.outputs.base }}
          filters: .github/ci-path-filters.yml
          working-directory: NeMo-Flow

  check:
    name: Check
    needs: [changes]
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          version: ${{ env.NEMO_FLOW_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: ${{ env.NEMO_FLOW_CI_WORKSPACE }}/uv.lock

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.NEMO_FLOW_CI_GO_VERSION }}
          cache: false

      - name: Install managed Python
        run: |
          set -e
          UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEMO_FLOW_CI_NODE_VERSION }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target
          cache-all-crates: true
          cache-bin: false
          save-if: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: cargo-deny@${{ env.NEMO_FLOW_CI_CARGO_DENY_VERSION }}

      - name: Install cargo-about
        uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: cargo-about@${{ env.NEMO_FLOW_CI_CARGO_ABOUT_VERSION }}

      - name: pre-commit
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        env:
          PRE_COMMIT_BASE: ${{ needs.changes.outputs.base }}
        run: |
          set -e
          uv tool install pre-commit==4.5
          if [[ "${{ inputs.ref_type }}" == "tag" || "${{ inputs.ref_name }}" == "main" || "${{ inputs.ref_name }}" == "${{ github.event.repository.default_branch }}" || -z "$PRE_COMMIT_BASE" ]]; then
            pre-commit run --all-files --show-diff-on-failure
          else
            if [[ "$PRE_COMMIT_BASE" =~ ^[0-9a-f]{40}$ || "$PRE_COMMIT_BASE" == refs/* ]]; then
              base_ref="$PRE_COMMIT_BASE"
            else
              base_ref="origin/$PRE_COMMIT_BASE"
            fi
            if [[ ! "$PRE_COMMIT_BASE" =~ ^[0-9a-f]{40}$ && "$base_ref" != "$GITHUB_REF" ]]; then
              base_ref="$(git merge-base "$base_ref" HEAD)"
            fi
            pre-commit run --from-ref "$base_ref" --to-ref HEAD --show-diff-on-failure
          fi

  docs:
    name: Documentation
    needs: [changes, check]
    if: ${{ (startsWith(inputs.ref_name, 'pull-request/') || inputs.ref_name == 'main' || inputs.ref_name == github.event.repository.default_branch || inputs.ref_type == 'tag') && (needs.changes.outputs.run_all == 'true' || needs.changes.outputs.docs == 'true') }}
    runs-on: linux-amd64-cpu4
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          version: ${{ env.NEMO_FLOW_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: ${{ env.NEMO_FLOW_CI_WORKSPACE }}/uv.lock

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEMO_FLOW_CI_NODE_VERSION }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          rustflags: ""

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target
          cache-all-crates: true
          cache-bin: false
          save-if: false

      - name: Install managed Python
        run: |
          set -e
          UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}

      - uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: just@${{ env.NEMO_FLOW_CI_JUST_VERSION }}

      - name: Install Documentation Dependencies
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: uv sync --no-default-groups --group docs --no-install-project

      - name: Install Node.js Documentation Dependencies
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}/crates/node
        run: npm ci --ignore-scripts

      - name: Materialize Main Branch For Versioned Docs
        if: ${{ inputs.ref_type == 'tag' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: git fetch --force origin +refs/heads/main:refs/heads/main

      - name: Check Documentation Links
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        env:
          NEMO_FLOW_DOCS_DEPS_READY: "1"
        run: just docs-linkcheck

      - name: Build Documentation Site
        if: ${{ startsWith(inputs.ref_name, 'pull-request/') }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        env:
          NEMO_FLOW_DOCS_DEPS_READY: "1"
        run: just docs

      - name: Build Versioned Documentation Site
        if: ${{ inputs.ref_name == 'main' || inputs.ref_type == 'tag' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        env:
          NEMO_FLOW_DOCS_DEPS_READY: "1"
        run: just docs-github-pages

      - name: Upload GitHub Pages Artifact
        if: ${{ inputs.ref_name == 'main' || inputs.ref_type == 'tag' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}/docs/_build/pages

  test-rust:
    name: Test / Rust / ${{ matrix.platform }}
    needs: [changes, check]
    if: ${{ needs.changes.outputs.run_all == 'true' || needs.changes.outputs.rust == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    services:
      redis:
        image: ${{ matrix.redis_service_image }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: linux-amd64-cpu4
            run_redis_tests: true
            redis_service_image: redis:7.4.7-alpine
          - platform: linux-arm64
            runner: linux-arm64-cpu4
            run_redis_tests: false
            redis_service_image: ''
          - platform: macos-arm64
            runner: macos-15
            run_redis_tests: false
            redis_service_image: ''
          - platform: windows-amd64
            runner: windows-2022
            run_redis_tests: false
            redis_service_image: ''
          - platform: windows-arm64
            runner: windows-11-arm
            run_redis_tests: false
            redis_service_image: ''

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target
          cache-all-crates: true
          cache-bin: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          version: ${{ env.NEMO_FLOW_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: ${{ env.NEMO_FLOW_CI_WORKSPACE }}/uv.lock

      - name: Set up Windows ARM Python
        if: ${{ matrix.platform == 'windows-arm64' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}
          architecture: arm64

      - name: Select setup-python interpreter for uv
        if: ${{ matrix.platform == 'windows-arm64' }}
        run: |
          set -e
          python - <<'PY' >> "$GITHUB_ENV"
          import sys
          print(f"UV_PYTHON={sys.executable}")
          PY

      - name: Install managed Python
        if: ${{ matrix.platform != 'windows-arm64' }}
        run: |
          set -e
          UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}

      - name: Add Python DLL directory to PATH on Windows
        if: runner.os == 'Windows'
        run: |
          set -e
          python_exe="$(uv python find)"
          python_home="$("$python_exe" -c 'import sys; print(sys.base_prefix)')"
          echo "$python_home" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: cargo-llvm-cov@${{ env.NEMO_FLOW_CI_CARGO_LLVM_COV_VERSION }},cargo-nextest@${{ env.NEMO_FLOW_CI_CARGO_NEXTEST_VERSION }},just@${{ env.NEMO_FLOW_CI_JUST_VERSION }}

      - name: Run Rust tests with coverage
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          set -e
          args=(
            --set ci true
            --set output_dir "${{ github.workspace }}"
          )
          if [ "${{ matrix.run_redis_tests }}" = "true" ]; then
            export NEMO_FLOW_RUN_REDIS_TESTS=1
          fi
          just "${args[@]}" test-rust

      - name: Upload Rust coverage to Codecov
        if: ${{ matrix.platform != 'windows-arm64' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: rust-workspace.xml
          flags: rust-${{ matrix.platform }}
          name: rust-${{ matrix.platform }}
          verbose: true

  test-go:
    name: Test / Go / ${{ matrix.platform }}
    needs: [changes, check]
    if: ${{ needs.changes.outputs.run_all == 'true' || needs.changes.outputs.go == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: linux-amd64-cpu4
          - platform: linux-arm64
            runner: linux-arm64-cpu4
          - platform: macos-arm64
            runner: macos-15
          - platform: windows-amd64
            runner: windows-2022
          - platform: windows-arm64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}

      - uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: cargo-llvm-cov@${{ env.NEMO_FLOW_CI_CARGO_LLVM_COV_VERSION }},just@${{ env.NEMO_FLOW_CI_JUST_VERSION }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target
          cache-all-crates: true
          cache-bin: false
          save-if: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.NEMO_FLOW_CI_GO_VERSION }}
          cache: false

      - name: Run Go tests with coverage
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          set -e
          just --set ci true --set output_dir "${{ github.workspace }}" test-go

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: go-coverage.xml
          flags: go-${{ matrix.platform }}
          name: go-${{ matrix.platform }}
          verbose: true

  test-node:
    name: Test / Node / ${{ matrix.platform }}
    needs: [changes, check]
    if: ${{ needs.changes.outputs.run_all == 'true' || needs.changes.outputs.node == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: linux-amd64-cpu4
          - platform: linux-arm64
            runner: linux-arm64-cpu4
          - platform: macos-arm64
            runner: macos-15
          - platform: windows-amd64
            runner: windows-2022
          - platform: windows-arm64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target
          cache-all-crates: true
          cache-bin: false
          save-if: false

      - uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: cargo-llvm-cov@${{ env.NEMO_FLOW_CI_CARGO_LLVM_COV_VERSION }},just@${{ env.NEMO_FLOW_CI_JUST_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEMO_FLOW_CI_NODE_VERSION }}

      - name: Run Node tests with coverage
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: just --set ci true --set output_dir "${{ github.workspace }}" test-node

      - name: Upload Node coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: node-coverage.xml,node-rust.xml
          flags: node-${{ matrix.platform }}
          name: node-${{ matrix.platform }}
          verbose: true

  test-python:
    name: Test / Python / ${{ matrix.platform }}
    needs: [changes, check]
    if: ${{ needs.changes.outputs.run_all == 'true' || needs.changes.outputs.python == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: linux-amd64-cpu4
          - platform: linux-arm64
            runner: linux-arm64-cpu4
          - platform: macos-arm64
            runner: macos-15
          - platform: windows-amd64
            runner: windows-2022
          - platform: windows-arm64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target
          cache-all-crates: true
          cache-bin: false
          save-if: false

      - uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
        with:
          tool: cargo-llvm-cov@${{ env.NEMO_FLOW_CI_CARGO_LLVM_COV_VERSION }},just@${{ env.NEMO_FLOW_CI_JUST_VERSION }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          version: ${{ env.NEMO_FLOW_CI_UV_VERSION }}
          enable-cache: true
