codecov:
  require_ci_to_pass: true
  notify:
    # CI uploads coverage from 5 test jobs, each on a 3-way platform matrix.
    after_n_builds: 15
    wait_for_ci: true

coverage:
  round: nearest
  precision: 2
  range: "94...100"
  status:
    project:
      default:
        target: 88%
        threshold: 0.5%
        base: auto
        if_ci_failed: error
    patch:
      default:
        target: 90%
        threshold: 5%
        base: auto
        if_ci_failed: error

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 0.5%
        base: auto
        if_ci_failed: error
  individual_components:
    - component_id: rust_runtime
      name: Rust Runtime
      paths:
        - "NeMo-Flow/crates/core/src"
        - "NeMo-Flow/crates/adaptive/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: go_binding
      name: Go Binding
      paths:
        - "NeMo-Flow/go/nemo_flow"
        - "NeMo-Flow/crates/ffi/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: python_binding
      name: Python Binding
      paths:
        - "NeMo-Flow/python/nemo_flow"
        - "NeMo-Flow/crates/python/src"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: node_binding
      name: Node Binding
      paths:
        - "NeMo-Flow/crates/node/*.js"
      statuses:
        - type: project
          target: 95%
          threshold: 0.5%
          base: auto
          if_ci_failed: error
    - component_id: wasm_binding
      name: WASM Binding
      paths:
        - "NeMo-Flow/crates/wasm/pkg/*.js"
      statuses:
        - type: project
          target: 84% # cannot be any higher due to internals
          threshold: 0.5%
          base: auto
          if_ci_failed: error

comment:
  after_n_builds: 15
  layout: "header, diff, components, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: false

github_checks:
  annotations: false

ignore:
  - "**/examples/**"
  - "**/third_party/**"
  - "**/tests/**"
  - "**/tests-js/**"
  # The Node binding currently reports JS package coverage separately; exclude the
  # native Rust bridge until we have direct Rust-side coverage for this crate.
  - "**/crates/node/src/**"
  - "**/crates/node/coverage/**"
  - "**/target/**"
  - "**/*.d.ts"
  - "**/*.pyi"
  - "**/python/nemo_flow/lib_native*.dylib.dSYM/**"
  # impossible to cover due to wasm-bindgen internals
  - "**/crates/wasm/src/api/mod.rs"
